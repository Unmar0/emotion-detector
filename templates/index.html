<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
        }

        textarea {
            width: 100%;
            height: 120px;
            font-size: 16px;
            padding: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
        }

        #result {
            margin-top: 25px;
            font-weight: bold;
            color: #1f3d5a;
        }
    </style>

    <script>
        function analyzeEmotion() {
            const text = document.getElementById("textToAnalyze").value;

            fetch("/emotionDetector?textToAnalyze=" + encodeURIComponent(text))
                .then(response => response.text())
                .then(data => {
                    document.getElementById("result").innerHTML = data;
                });
        }
    </script>
</head>

<body>
    <div class="container">
        <h1>Emotion Detector</h1>

        <p>Enter text below to detect the dominant emotion:</p>

        <textarea id="textToAnalyze" placeholder="Type your text here..."></textarea>

        <br>

        <button onclick="analyzeEmotion()">Analyze Emotion</button>

        <div id="result"></div>
    </div>
</body>
</html>
